# Primary crate — owns the CHANGELOG rewrite and the workspace tag.
# (cli + mcp set tag = false so we don't get duplicate tags.)

pre-release-replacements = [
  { file = "../CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}", exactly = 1 },
  { file = "../CHANGELOG.md", search = "v{{prev_version}}\\.\\.\\.HEAD", replace = "v{{version}}...HEAD", exactly = 1 },
  { file = "../CHANGELOG.md", search = "\\[{{prev_version}}\\]:", replace = "[{{version}}]: https://github.com/snehith01001110/ISO-Framework/releases/tag/v{{version}}\n[{{prev_version}}]:", exactly = 1 },
]
